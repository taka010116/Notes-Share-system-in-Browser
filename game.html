<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BM26</title>

    <style>

        body{
            margin:0;
            background:black;
            color:white;
            font-family:sans-serif;
            overflow:hidden;
        }

        #topbar{
            background:#111;
            padding:10px;
        }

        #container{
            display:flex;
            height:calc(100vh - 60px);
        }

        /* GAME */

        #game{
            width:60%;
            position:relative;
            background:#000;
        }

        #lanes{
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            width:350px;
            height:100%;
            display:flex;
        }

        .lane{
            flex:1;
            border-left:1px solid #333;
            border-right:1px solid #333;
            position:relative;
            overflow:hidden;
            background:#000;
            transition:background 0.05s;
        }

        .lane.active{
            background:#444;
        }
        /*
        .note{
            position:absolute;
            width:80%;
            left:10%;
            height:18px;
            background:#00ffff;
            border-radius:4px;
        }*/

        /* 判定ライン */

        .judgeLine{
            position:absolute;
            bottom:120px;
            width:350px;
            height:4px;
            background:yellow;
            left:50%;
            transform:translateX(-50%);
        }

        /*
        #judgeImage{
            position:absolute;
            bottom:200px;
            left:50%;
            transform:translateX(-50%);
            height:80px;
            pointer-events:none;
        }
        */

        /* BGA */

        #bgaArea{
            width:40%;
            background:#000;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        #bga{
            width:100%;
            height:100%;
            object-fit:contain;
        }

        #score{
            position:absolute;
            top:10px;
            left:10px;
            font-size:20px;
        }

        #judgeContainer{
            position:absolute;
            bottom:200px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            align-items:center;
            gap:15px;
        }

        #judgeImage{
            height:180px;
        }

        #combo{
            display:flex;
            align-items:center;
        }

        .comboDigit{
            height:60px;
        }

        .note{
            position:absolute;
            width:100%;
            left:0%;
            height:18px;
            /* background:#00ffff; 削除 */
            border-radius:4px;
            background-image: url('images/note.png');
            background-size: contain;
            background-repeat: no-repeat;
        }

    </style>
</head>

<body>

    <div id="topbar">

        フォルダ選択  
        <input type="file" id="folderInput" webkitdirectory>

        スピード  
        <input type="number" id="speedInput" value="250">

        <button id="startButton">ゲームスタート</button>

    </div>

    <div id="container">

        <div id="game">

            <div id="lanes"></div>

            <div class="judgeLine"></div>

            <div id="judgeContainer">

                <img id="judgeImage">

                <div id="combo"></div>

            </div>

            <div id="score">Score:0</div>

        </div>

        <div id="bgaArea">
            <img id="bga">
        </div>

    </div>

    <script>

        /* ==============================
        設定
        ============================== */
        const numberPos = {

            1:[0,0],
            2:[270,0],
            3:[540,0],
            4:[810,0],
            5:[1080,0],

            6:[0,270],
            7:[270,270],
            8:[540,270],
            9:[810,270],
            0:[1080,270]

        }

        const laneCount = 5
        const lookAhead = 3.0
        let combo = 0
        const comboDiv = document.getElementById("combo")

        /* 対応キー */

        const keyMap={
            "f":0,
            "g":1,
            "h":2,
            "j":3,
            "k":4
        }

        const judgeTiming={
            great:0.10,
            good:0.20,
            bad:0.38
        }

        /* ==============================
        DOM
        ============================== */

        const lanesDiv=document.getElementById("lanes")
        const judgeImg=document.getElementById("judgeImage")
        const scoreDiv=document.getElementById("score")
        const bga=document.getElementById("bga")

        /* ==============================
        レーン生成
        ============================== */

        let lanes=[]

        for(let i=0;i<laneCount;i++){

            let lane=document.createElement("div")
            lane.className="lane"

            lanesDiv.appendChild(lane)

            lanes.push(lane)

            lane.addEventListener("mousedown",()=>{
                pressLane(i)
            })

        }

        /* ==============================
        Audio
        ============================== */

        const audioCtx=new (window.AudioContext||window.webkitAudioContext)()

        let wavBuffers={}
        let bmpFiles={}
        let chart=null

        /* ==============================
        フォルダ読み込み
        ============================== */

        folderInput.onchange=async function(e){

            let files=e.target.files

            for(let f of files){

                if(f.name.endsWith(".wav")){

                    let arr=await f.arrayBuffer()
                    wavBuffers[f.name]=await audioCtx.decodeAudioData(arr)

                }

                if(f.name.endsWith(".bmp")){

                    bmpFiles[f.name]=URL.createObjectURL(f)

                }

                if(f.name.endsWith(".json")){

                    let text=await f.text()
                    chart=JSON.parse(text)

                }

            }

            alert("フォルダ読み込み完了")

        }

        /* ==============================
        譜面
        ============================== */

        let notes=[]
        let bgaEvents=[]
        let bgmEvents=[]
        let bpm=120

        let startTime=0
        let score=0

        /* ==============================
        ゲーム開始
        ============================== */

        startButton.onclick=function(){

            if(!chart){
                alert("jsonがありません")
                return
            }

            bpm=chart.bpm

            notes=[]
            bgmEvents=[]
            bgaEvents=[]

            for(let n of chart.notes){

                if(n.lane<=4){
                    notes.push(JSON.parse(JSON.stringify(n)))
                }else{
                    bgmEvents.push(JSON.parse(JSON.stringify(n)))
                }

            }

            bgaEvents=chart.bga || []

            createNotes()

            startGame()

        }

        /* ==============================
        ノーツ生成
        ============================== */

        function createNotes(){

            for(let n of notes){

                let lane=lanes[n.lane]

                let div=document.createElement("div")
                div.className="note"

                // 画像に置き換え
                div.style.backgroundImage = "url('images/note.png')"
                div.style.backgroundSize = "contain"
                div.style.backgroundRepeat = "no-repeat"

                lane.appendChild(div)
                n.element=div
                n.hit=false

            }

        }

        /* ==============================
        音再生
        ============================== */

        function playSound(name){

            let buf=wavBuffers[name]
            if(!buf)return

            let src=audioCtx.createBufferSource()
            src.buffer=buf
            src.connect(audioCtx.destination)
            src.start()

        }

        /* ==============================
        レーン発光
        ============================== */

        function flashLane(i){

            lanes[i].classList.add("active")

            setTimeout(()=>{
                lanes[i].classList.remove("active")
            },80)

        }

        /* ==============================
        次ノーツ音
        ============================== */

        function playNextNoteSound(lane){

            for(let n of notes){

                if(!n.hit && n.lane==lane){

                    playSound(n.wav)
                    return

                }

            }

        }

        /* ==============================
        キー入力
        ============================== */

        document.addEventListener("keydown",function(e){

            let lane=keyMap[e.key]

            if(lane===undefined)return

            pressLane(lane)

        })

        /* ==============================
        レーン押下処理
        ============================== */

        function pressLane(lane){

            flashLane(lane)

            playNextNoteSound(lane)

            let now=performance.now()/1000-startTime
            let beat=60/bpm

            for(let n of notes){

                if(n.hit)continue
                if(n.lane!=lane)continue

                let t=n.row*(beat/4)

                let diff=now-t

                let j=judge(diff)

                if(j){

                    n.hit=true

                    showJudge(j)

                    if(j==="GREAT" || j==="GOOD"){

                        combo++

                    }else{

                        combo=0

                    }

                    drawCombo()

                    score+=100
                    scoreDiv.innerText="Score:"+score

                    n.element.remove()

                    return

                }

            }
        }

        /* ==============================
        判定
        ============================== */

        function judge(diff){

            diff=Math.abs(diff)

            if(diff<=judgeTiming.great) return "GREAT"
            if(diff<=judgeTiming.good) return "GOOD"
            if(diff<=judgeTiming.bad) return "BAD"

            return null

        }

        function showJudge(type){

            judgeImg.src="images/"+type+".png"

            drawCombo()

            setTimeout(()=>{
                judgeImg.src=""
                comboDiv.innerHTML = ""
            },200)

        }

        //コンボ描画
        function drawCombo(){

            comboDiv.innerHTML=""

            if(combo<=0) return

            let text = combo.toString()

            for(let c of text){

                let img = document.createElement("img")

                img.src = "images/" + c + ".png"

                img.className = "comboDigit"

                comboDiv.appendChild(img)

            }

        }

        /* ==============================
        ゲーム開始
        ============================== */

        function startGame(){

            startTime=performance.now()/1000

            requestAnimationFrame(update)

        }

        /* ==============================
        ゲームループ
        ============================== */

        function update(){

            let now=performance.now()/1000-startTime
            let beat=60/bpm
            let speed=parseFloat(speedInput.value)

            /* ノーツ */

            for(let n of notes){

                if(n.hit)continue

                let t=n.row*(beat/4)

                let diff=t-now

                if(diff>lookAhead) continue

                let y=(1-(diff/lookAhead))*600

                n.element.style.top=y+"px"

                if(diff<-judgeTiming.bad){

                    n.hit=true

                    showJudge("MISS")

                    combo=0
                    drawCombo()

                    n.element.remove()

                }

            }

            /* BGM */

            for(let b of bgmEvents){

                if(b.played)continue

                let t=b.row*(beat/4)

                if(now>=t){

                    playSound(b.wav)

                    b.played=true

                }

            }

            /* BGA */

            for(let e of bgaEvents){

                let t=e.row*(beat/4)

                if(now>=t){

                    bga.src=bmpFiles[e.bmp]

                }

            }

            requestAnimationFrame(update)

        }

    </script>

</body>
</html>
