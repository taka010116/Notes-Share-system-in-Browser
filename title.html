<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAT SYSTEM</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000000; /* 完全ブラック */
  color: #e6ffff;
  overflow: hidden;
}

/* ====== 背景レイヤー ====== */
.bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* 微細グリッド（低コントラスト） */
.bg.grid {
  background:
    repeating-linear-gradient(90deg, rgba(0,255,255,0.05) 0 1px, transparent 1px 80px),
    repeating-linear-gradient(0deg,  rgba(0,255,255,0.03) 0 1px, transparent 1px 80px);
  animation: gridMove 18s linear infinite;
}

@keyframes gridMove {
  from { transform: translate(0,0); }
  to   { transform: translate(-200px,-200px); }
}

/* ゆっくり呼吸するグロー */
.bg.glow {
  background:
    radial-gradient(40% 30% at 20% 30%, rgba(0,255,255,0.10), transparent 60%),
    radial-gradient(30% 25% at 80% 70%, rgba(0,255,255,0.08), transparent 60%);
  filter: blur(10px);
  animation: breathe 6s ease-in-out infinite alternate;
}

@keyframes breathe {
  from { opacity: .5; }
  to   { opacity: .9; }
}

/* 浮遊パーティクル（軽量CSS） */
.bg.particles::before, .bg.particles::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    radial-gradient(2px 2px at 15% 25%, rgba(0,255,255,.9), transparent),
    radial-gradient(2px 2px at 65% 55%, rgba(0,255,255,.7), transparent),
    radial-gradient(1.5px 1.5px at 35% 75%, rgba(0,255,255,.8), transparent),
    radial-gradient(2px 2px at 85% 15%, rgba(0,255,255,.6), transparent);
  animation: float 14s linear infinite;
}
.bg.particles::after { animation-duration: 20s; opacity: .6; }

@keyframes float {
  from { transform: translateY(0); }
  to   { transform: translateY(-220px); }
}

/* 斜めスイープ（高級感） */
.bg.sweep {
  background: linear-gradient(120deg, transparent, rgba(0,255,255,.10), transparent);
  animation: sweep 7s linear infinite;
  mix-blend-mode: screen;
}

@keyframes sweep {
  from { transform: translateX(-120%) rotate(20deg); }
  to   { transform: translateX(120%) rotate(20deg); }
}

/* スキャンライン */
.scanline {
  position: fixed; left: 0; top: 0; width: 100%; height: 3px;
  background: linear-gradient(90deg, transparent, #00ffff, transparent);
  box-shadow: 0 0 20px #00ffff;
  animation: scan 3.5s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  from { transform: translateY(0); }
  to   { transform: translateY(100vh); }
}

/* ====== コンテンツ ====== */
#container {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  text-align: center;
  animation: fadeIn .9s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(.98); }
  to   { opacity: 1; transform: scale(1); }
}

h1 {
  margin: 0 0 56px;
  font-size: 76px;
  letter-spacing: 10px;
  color: #00ffff;
  text-shadow:
    0 0 8px #00ffff,
    0 0 22px #00ffff,
    0 0 60px rgba(0,255,255,.45);
  animation: pulse 2.2s ease-in-out infinite alternate;
}

@keyframes pulse {
  from { filter: brightness(.9); }
  to   { filter: brightness(1.2); }
}

.panel {
  padding: 24px 28px 30px;
  border: 1px solid rgba(0,255,255,.25);
  border-radius: 14px;
  background: rgba(0,0,0,.35);
  box-shadow:
    0 0 0 1px rgba(0,255,255,.08) inset,
    0 0 30px rgba(0,255,255,.12);
  backdrop-filter: blur(6px);
}

button {
  display: block;
  width: 320px;
  margin: 16px auto;
  padding: 16px 0;
  font-size: 22px;
  letter-spacing: 2px;
  border: 2px solid #00ffff;
  border-radius: 10px;
  background: rgba(0,0,0,.5);
  color: #00ffff;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform .18s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
}

/* 光のスライド */
button::before {
  content: "";
  position: absolute; inset: 0;
  transform: translateX(-120%);
  background: linear-gradient(120deg, transparent, rgba(0,255,255,.35), transparent);
}

button:hover::before {
  animation: shine .7s ease;
}

@keyframes shine {
  to { transform: translateX(120%); }
}

button:hover {
  background: #00ffff;
  color: #000;
  transform: translateY(-1px) scale(1.04);
  box-shadow: 0 0 18px #00ffff, 0 0 50px rgba(0,255,255,.6);
}

button:active {
  transform: scale(.98);
  box-shadow: 0 0 10px #00ffff inset;
}

#menu { display: none; }

/* メニュー出現：分割スライド風 */
.menu-enter {
  animation: menuIn .6s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes menuIn {
  from { opacity: 0; transform: translateY(18px); filter: blur(6px); }
  to   { opacity: 1; transform: translateY(0); filter: blur(0); }
}

.footer {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 12px; letter-spacing: 2px; color: rgba(0,255,255,.6);
}
</style>
</head>
<body>

<!-- 背景レイヤー -->
<div class="bg grid"></div>
<div class="bg glow"></div>
<div class="bg particles"></div>
<div class="bg sweep"></div>
<div class="scanline"></div>

<!-- UI -->
<div id="container">
  <div>
    <h1>BEAT SYSTEM</h1>
    <div class="panel">
      <div id="title">
        <button onclick="startGame()">START</button>
      </div>
      <div id="menu">
        <button onclick="alert('プレイ画面へ')">PLAY</button>
        <button onclick="alert('譜面作成画面へ')">EDITOR</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">SYSTEM READY</div>

<script>
function startGame() {
  const title = document.getElementById('title');
  const menu = document.getElementById('menu');

  // フラッシュ演出
  const flash = document.createElement('div');
  flash.style.position = 'fixed';
  flash.style.inset = '0';
  flash.style.background = '#00ffff';
  flash.style.opacity = '0.25';
  flash.style.pointerEvents = 'none';
  flash.style.transition = 'opacity .25s ease';
  document.body.appendChild(flash);
  requestAnimationFrame(() => { flash.style.opacity = '0'; });
  setTimeout(() => flash.remove(), 260);

  // 切り替え
  title.style.display = 'none';
  menu.style.display = 'block';
  menu.classList.add('menu-enter');
}
</script>

</body>
</html>
